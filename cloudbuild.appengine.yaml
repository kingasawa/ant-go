steps:
  - name: "gcr.io/cloud-builders/npm"
    args: ["ci"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    secretEnv:
      - FIREBASE_ADMIN_CREDENTIALS_JSON
      - GITHUB_APP_PRIVATE_KEY
      - GITHUB_APP_CLIENT_SECRET
      - GITHUB_APP_WEBHOOK_SECRET
      - PROFILE_SIGNING_CERT
      - PROFILE_SIGNING_KEY
      - ASC_ENCRYPTION_KEY
    args:
      - "-c"
      - |
        cat > env.yaml <<EOF
        env_variables:
          FIREBASE_ADMIN_CREDENTIALS_JSON: '$$FIREBASE_ADMIN_CREDENTIALS_JSON'
          NEXT_PUBLIC_FIREBASE_API_KEY: "${_NEXT_PUBLIC_FIREBASE_API_KEY}"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}"
          NEXT_PUBLIC_FIREBASE_APP_ID: "${_NEXT_PUBLIC_FIREBASE_APP_ID}"
          GITHUB_APP_ID: "${_GITHUB_APP_ID}"
          GITHUB_APP_SLUG: "${_GITHUB_APP_SLUG}"
          GITHUB_APP_CLIENT_ID: "${_GITHUB_APP_CLIENT_ID}"
          GITHUB_APP_PRIVATE_KEY: '$$GITHUB_APP_PRIVATE_KEY'
          GITHUB_APP_CLIENT_SECRET: '$$GITHUB_APP_CLIENT_SECRET'
          GITHUB_APP_WEBHOOK_SECRET: '$$GITHUB_APP_WEBHOOK_SECRET'
          PROFILE_SIGNING_CERT: '$$PROFILE_SIGNING_CERT'
          PROFILE_SIGNING_KEY: '$$PROFILE_SIGNING_KEY'
          ASC_ENCRYPTION_KEY: '$$ASC_ENCRYPTION_KEY'
        EOF

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    args: ["gcloud", "app", "deploy", "app.yaml", "--quiet", "--project=$PROJECT_ID"]

availableSecrets:
  secretManager:
    - versionName: "projects/$PROJECT_ID/secrets/FIREBASE_ADMIN_CREDENTIALS_JSON/versions/latest"
      env: "FIREBASE_ADMIN_CREDENTIALS_JSON"
    - versionName: "projects/$PROJECT_ID/secrets/GITHUB_APP_PRIVATE_KEY/versions/latest"
      env: "GITHUB_APP_PRIVATE_KEY"
    - versionName: "projects/$PROJECT_ID/secrets/GITHUB_APP_CLIENT_SECRET/versions/latest"
      env: "GITHUB_APP_CLIENT_SECRET"
    - versionName: "projects/$PROJECT_ID/secrets/GITHUB_APP_WEBHOOK_SECRET/versions/latest"
      env: "GITHUB_APP_WEBHOOK_SECRET"
    - versionName: "projects/$PROJECT_ID/secrets/PROFILE_SIGNING_CERT/versions/latest"
      env: "PROFILE_SIGNING_CERT"
    - versionName: "projects/$PROJECT_ID/secrets/PROFILE_SIGNING_KEY/versions/latest"
      env: "PROFILE_SIGNING_KEY"
    - versionName: "projects/$PROJECT_ID/secrets/ASC_ENCRYPTION_KEY/versions/latest"
      env: "ASC_ENCRYPTION_KEY"

substitutions:
  _NEXT_PUBLIC_FIREBASE_API_KEY: ""
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ""
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ""
  _NEXT_PUBLIC_FIREBASE_APP_ID: ""
  _GITHUB_APP_ID: "3540521"
  _GITHUB_APP_SLUG: "ant-go-work"
  _GITHUB_APP_CLIENT_ID: "Iv23lipnx3QFU6MKTtQi"

options:
  substitution_option: "ALLOW_LOOSE"
  logging: "CLOUD_LOGGING_ONLY"
