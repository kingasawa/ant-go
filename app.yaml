runtime: nodejs24

# Dùng instance F2 (512MB RAM) vì Next.js cần nhiều bộ nhớ hơn F1
instance_class: F1

# Biến môi trường không nhạy cảm
env_variables:
  NODE_ENV: "production"

# Biến nhạy cảm được load từ file env.yaml (không commit lên git)
# Tạo file env.yaml từ env.yaml.example và điền các giá trị thực
includes:
  - env.yaml

automatic_scaling:
  min_instances: 0
  max_instances: 2
  target_cpu_utilization: 0.65

handlers:
  - url: /.*
    script: auto
    secure: always

