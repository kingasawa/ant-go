# cloudbuild.submit.yaml
# Upload IPA lên TestFlight qua Fastlane.
# Được trigger programmatically từ POST /api/apps/[appName]/submissions.
# Không dùng cho CI/CD deploy — chỉ dùng cho submission jobs.
#
# Substitutions (truyền từ API):
#   _SUBMISSION_ID : ID của doc trong Firestore submissions/
#   _IPA_URL       : Download URL của IPA trên Firebase Storage
#   _APP_NAME      : Tên app
#   _USER_ID       : UID của user

steps:
  # 1. Download IPA từ Firebase Storage
  - name: 'gcr.io/cloud-builders/curl'
    args: ['-L', '${_IPA_URL}', '-o', '/workspace/app.ipa']

  # 2. Fetch ASC key + đánh dấu uploading
  - name: 'node:20-slim'
    entrypoint: 'bash'
    secretEnv: ['FIREBASE_ADMIN_CREDENTIALS_JSON', 'ASC_ENCRYPTION_KEY']
    args:
      - '-c'
      - |
        npm install firebase-admin --quiet --no-audit --no-fund --prefix /tmp/deps
        NODE_PATH=/tmp/deps/node_modules \
          ASC_ENCRYPTION_KEY=$$ASC_ENCRYPTION_KEY \
          node scripts/fetch-asc-key.js '${_USER_ID}' '${_APP_NAME}' /workspace/asc_key.json
        NODE_PATH=/tmp/deps/node_modules \
          node scripts/update-submission-status.js '${_SUBMISSION_ID}' uploading

  # 3. Upload lên TestFlight
  - name: 'ruby:3.2-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gem install fastlane --no-document -q
        fastlane run upload_to_testflight \
          ipa:/workspace/app.ipa \
          api_key_path:/workspace/asc_key.json \
          skip_waiting_for_build_processing:true

  # 4. Đánh dấu done
  - name: 'node:20-slim'
    entrypoint: 'bash'
    secretEnv: ['FIREBASE_ADMIN_CREDENTIALS_JSON']
    args:
      - '-c'
      - |
        NODE_PATH=/tmp/deps/node_modules \
          node scripts/update-submission-status.js '${_SUBMISSION_ID}' done

availableSecrets:
  secretManager:
    - versionName: 'projects/$PROJECT_ID/secrets/FIREBASE_ADMIN_CREDENTIALS_JSON/versions/latest'
      env: 'FIREBASE_ADMIN_CREDENTIALS_JSON'
    - versionName: 'projects/$PROJECT_ID/secrets/ASC_ENCRYPTION_KEY/versions/latest'
      env: 'ASC_ENCRYPTION_KEY'

substitutions:
  _SUBMISSION_ID: ''
  _IPA_URL: ''
  _APP_NAME: ''
  _USER_ID: ''

timeout: '1800s'

options:
  logging: 'CLOUD_LOGGING_ONLY'
